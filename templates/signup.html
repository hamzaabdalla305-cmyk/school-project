{% extends 'base.html' %}
{% block title %}إنشاء حساب{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center">إنشاء حساب جديد</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">تسجيل</button>
        </form>
        <p class="mt-3 text-center">لديك حساب؟ <a href="{% url 'login' %}">تسجيل الدخول</a></p>
    </div>
</div>
{% endblock %}
